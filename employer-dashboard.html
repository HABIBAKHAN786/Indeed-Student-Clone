<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Dashboard — Indeed Pakistan Clone</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="employer-dashboard">
  <div id="app-layout" style="display:flex;flex-direction:column;min-height:100vh;">
    <div id="banner-slot"></div>
    <div id="navbar-slot"></div>
    <main style="flex:1;">
      <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
          <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;margin-bottom:8px;" id="sidebar-user-info"></div>
          <button class="dashboard-sidebar-link" data-section="overview"><span>📊</span><span>Overview</span></button>
          <button class="dashboard-sidebar-link" data-section="post-job"><span>➕</span><span>Post a New Job</span></button>
          <button class="dashboard-sidebar-link" data-section="jobs"><span>💼</span><span>My Posted Jobs</span></button>
          <button class="dashboard-sidebar-link" data-section="applications"><span>📬</span><span>Applications</span></button>
          <button class="dashboard-sidebar-link" data-section="company"><span>🏢</span><span>Company Profile</span></button>
        </aside>
        <main class="dashboard-content" id="dashboard-content"></main>
      </div>
    </main>
    <div id="footer-slot"></div>
    <div id="toast-container" class="toast-container" role="alert" aria-live="polite" style="display:none;"></div>
  </div>

  <script src="js/helpers.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/data.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/script.js"></script>
  <script>
    IndeedApp.initApp();
    IndeedAuth.subscribe(function () {
      var user = IndeedAuth.getUser();
      var info = document.getElementById('sidebar-user-info');
      if (user && info) {
        info.innerHTML = '<div class="avatar" style="margin-bottom:8px;">' + (user.company ? user.company.charAt(0) : user.name.charAt(0)) + '</div>' +
          '<div style="font-weight:700;font-size:14px;">' + (user.company || user.name) + '</div>' +
          '<div style="font-size:12px;color:#767676;">' + user.email + '</div>' +
          '<span class="badge badge-warning" style="margin-top:6px;">Employer</span>';
      }
    });
    var u = IndeedAuth.getUser();
    if (u) {
      document.getElementById('sidebar-user-info').innerHTML = '<div class="avatar" style="margin-bottom:8px;">' + (u.company ? u.company.charAt(0) : u.name.charAt(0)) + '</div>' +
        '<div style="font-weight:700;font-size:14px;">' + (u.company || u.name) + '</div><div style="font-size:12px;color:#767676;">' + u.email + '</div>' +
        '<span class="badge badge-warning" style="margin-top:6px;">Employer</span>';
    }
    IndeedDashboard.initEmployerDashboard();
  </script>
</body>
</html>
