<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Indeed Pakistan Clone</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-text"><span style="background:#2557a7;color:white;padding:2px 8px;border-radius:4px;margin-right:1px;">in</span>deed</div>
        <p style="font-size:14px;color:#767676;margin-top:8px;">Pakistan's #1 Job Platform</p>
      </div>

      <div class="role-tabs" role="tablist">
        <button type="button" role="tab" class="role-tab active" id="role-seeker" aria-selected="true">👤 Job Seeker</button>
        <button type="button" role="tab" class="role-tab" id="role-employer" aria-selected="false">🏢 Employer</button>
      </div>

      <h2 style="font-size:20px;font-weight:700;margin-bottom:4px;">Sign in to Indeed</h2>
      <p id="login-role-desc" style="color:#767676;font-size:13px;margin-bottom:24px;">Access your saved jobs, applications, and more.</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <input id="login-email" type="email" class="form-input" placeholder="your@email.com" autocomplete="email" />
          <span id="email-error" class="form-error"></span>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <label class="form-label" for="login-password">Password</label>
            <button type="button" id="forgot-password" style="font-size:12px;color:#2557a7;background:none;border:none;cursor:pointer;">Forgot password?</button>
          </div>
          <div style="position:relative;">
            <input id="login-password" type="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" />
            <button type="button" id="toggle-password" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#767676;" aria-label="Show password">👁️</button>
          </div>
          <span id="password-error" class="form-error"></span>
        </div>

        <div id="login-general-error" style="display:none;background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px;font-size:14px;color:#991b1b;margin-bottom:16px;align-items:center;gap:8px;"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-submit" style="margin-bottom:16px;">Sign In</button>
      </form>

      <div class="divider">Try with demo account</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button type="button" class="btn btn-ghost btn-sm" id="demo-seeker" style="flex:1;">👤 Demo Seeker</button>
        <button type="button" class="btn btn-ghost btn-sm" id="demo-employer" style="flex:1;">🏢 Demo Employer</button>
      </div>

      <div style="text-align:center;font-size:14px;">
        Don't have an account?
        <a href="signup.html" style="color:#2557a7;font-weight:700;">Create your account →</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container" role="alert" aria-live="polite" style="display:none;"></div>

  <script src="js/helpers.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
  <script>
    IndeedSeed.seedDemoAccounts();
    IndeedAuth.restoreSession();
    IndeedAuth.initLoginPage();
  </script>
</body>
</html>
